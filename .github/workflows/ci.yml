name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GIT_CONFIG_COUNT: 2
  GIT_CONFIG_KEY_0: url.https://crossnokaye-robot:${{ secrets.ROBOT_TOKEN }}@github.com.insteadOf
  GIT_CONFIG_VALUE_0: https://github.com
  GIT_CONFIG_KEY_1: url.https://crossnokaye-robot:${{ secrets.ROBOT_TOKEN }}@github.com.insteadOf
  GIT_CONFIG_VALUE_1: ssh://git@github.com
  PYTHON_MIN_VERSION: "3.11"

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_MIN_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: pip install -r requirements.txt --group dev

      - name: Cache Mypy
        uses: actions/cache@v5
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            mypy-${{ runner.os }}-${{ github.ref_name }}-
            mypy-${{ runner.os }}-main-
            mypy-${{ runner.os }}-

      - name: Run Mypy
        run: mypy

  linting:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v47
        with:
          files: |
            **/*.py

      - name: Set up Python
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_MIN_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        if: steps.changed-files.outputs.any_changed == 'true'
        run: pip install -r requirements.txt --group dev

      - name: Run ruff check
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo ${{ steps.changed-files.outputs.all_changed_files}}
          ruff check ${{ steps.changed-files.outputs.all_changed_files}}

      - name: Run ruff format check
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          ruff format --check --diff ${{ steps.changed-files.outputs.all_changed_files }}

  test:
    name: test (python ${{ matrix.python-version }}, ${{ matrix.deps }} dependencies)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { python-version: "3.11", deps: min }
          - { python-version: "3.12", deps: min }
          - { python-version: "3.13", deps: min }
          - { python-version: "3.14", deps: min }
          - { python-version: "3.11", deps: latest }
          - { python-version: "3.14", deps: latest }
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies (min)
        if: matrix.deps == 'min'
        run: pip install -r requirements.txt --group dev

      - name: Install dependencies (latest)
        if: matrix.deps == 'latest'
        run: pip install -e . --group dev

      - name: Log resolved versions
        run: pip freeze | sort

      - name: Run unit tests
        if: ${{!(matrix.python-version == env.PYTHON_MIN_VERSION && matrix.deps == 'min')}}
        run: pytest

      - name: Run unit tests with coverage
        if: matrix.python-version == env.PYTHON_MIN_VERSION && matrix.deps == 'min'
        run: pytest --cov --cov-report=xml:coverage-unit.xml --junitxml=junit-unit.xml -o junit_family=legacy

      - name: Upload coverage to Codecov
        if: always() && matrix.python-version == env.PYTHON_MIN_VERSION && matrix.deps == 'min' && hashFiles('coverage-unit.xml') != ''
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-unit.xml
          flags: unit-tests
          report_type: coverage
      - name: Upload test results to Codecov
        if: always() && matrix.python-version == env.PYTHON_MIN_VERSION && matrix.deps == 'min' && hashFiles('junit-unit.xml') != ''
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit-unit.xml
          flags: unit-tests
          report-type: test_results

  api-compatibility:
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_MIN_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Install dependencies
        run: pip install -r requirements.txt --group dev

      - name: Generate report
        id: generate-report
        run: |
          if griffe check atlas --search . --against origin/main --verbose > "$RUNNER_TEMP/griffe-report.txt" 2>&1; then
            echo "No public API changes detected."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            cat "$RUNNER_TEMP/griffe-report.txt"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Annotate pull request files
        if: steps.generate-report.outputs.changed == 'true'
        run: |
          griffe check atlas --search . --against origin/main --format github > "$RUNNER_TEMP/griffe-annotations.txt" 2>&1 || true
          sed -E 's/(::warning file=[^,]+,line=)0(,title=)/\11\2/' "$RUNNER_TEMP/griffe-annotations.txt"

      - name: Build summary
        env:
          API_CHANGED: ${{ steps.generate-report.outputs.changed }}
          REPO: ${{ github.repository }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          BASE_URL="https://github.com/${REPO}/blob/${HEAD_SHA}"
          # Turn leading "path:line:" references into Markdown links to the file at that line.
          # Module-level findings use line 0; link those to the top of the file with no anchor.
          link_report() {
            sed -E \
              -e "s|^([^[:space:]:]+):([1-9][0-9]*): |[\1:\2](${BASE_URL}/\1#L\2): |" \
              -e "s|^([^[:space:]:]+):0: |[\1](${BASE_URL}/\1): |" \
              "$RUNNER_TEMP/griffe-report.txt"
          }
          {
            echo "<!-- griffe-api-check-report -->"
            echo "## Public API Breaking Changes"
            if [ "$API_CHANGED" = "true" ]; then
              echo ":warning: Breaking changes detected"
              echo
              link_report
              echo
            else
              echo ":white_check_mark: No breaking changes detected"
            fi
            echo
            echo "---"
            echo
            echo "Griffe checked the public API surface for breaking changes against \`origin/main\`."
            echo
            echo "> [!NOTE]"
            echo "> Griffe does not analyze or report on runtime behavior or semantic changes."
            echo "> "
            echo "> This report is informational and will not block merging."
            echo
          } > "$RUNNER_TEMP/griffe-summary.md"

      - name: Publish summary
        run: cat "$RUNNER_TEMP/griffe-summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Comment summary on PR
        if: github.event.pull_request.head.repo.fork == false
        uses: actions/github-script@v8
        env:
          GRIFFE_SUMMARY: ${{ runner.temp }}/griffe-summary.md
        with:
          script: |
            const fs = require("fs");

            const marker = "<!-- griffe-api-check-report -->";
            const body = fs.readFileSync(process.env.GRIFFE_SUMMARY, "utf8");

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
            });
            const existingComment = comments.find((comment) => comment.body?.includes(marker));

            if (existingComment) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
